name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run VS Code Extension Host tests
        run: xvfb-run -a npm run test:vscode

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Package extension
        run: npm run package

      - name: Verify VSIX installation
        run: node tests/vscode/install-vsix.js

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: tsperf-local-vsix
          path: "*.vsix"
          if-no-files-found: error
